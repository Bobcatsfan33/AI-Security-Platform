# gitleaks config — secrets scanning (Phase 0.3 CI gate).
# Extends the default rule set; allowlists build artifacts and documented,
# non-sensitive test fixtures so the gate flags REAL leaks, not noise.

[extend]
useDefault = true

[allowlist]
description = "Build output + documented test fixtures (not real secrets)"

# Paths that must never count: build output (gitignored, per-build keys),
# caches, vendored deps, and lockfiles (integrity hashes look like keys).
paths = [
  '''(^|/)\.next/''',          # Next.js build output — ephemeral, gitignored
  '''(^|/)node_modules/''',
  '''(^|/)__pycache__/''',
  '''(^|/)\.venv/''',
  '''package-lock\.json$''',   # npm integrity sha-512 hashes are not secrets
]

# Documented non-sensitive test/CI values (32+ char strings that exist only to
# satisfy length validators in test and CI environments).
regexes = [
  '''ci-secret-must-be-at-least-32-chars-long-padding''',
  '''test-secret-must-be-at-least-32-chars-long-for-pydantic-validation''',
  # Public SHA-256 checksums of the Stage-2 ONNX release artifact
  # (stage2-pi-classifier-v1). Published integrity hashes, not secrets —
  # the provisioner verifies downloads against them.
  '''1dc9297b916a15b7acb93b9bb8776bd8d1edfea7223aadc0527ac46519a378ee''',
  '''133b1071a455bb96ec0d7aa1242e616cc42ec29652fded524fb6883832afa903''',
]
