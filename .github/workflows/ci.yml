name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U platform -d platform"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      JWT_SECRET: ci-secret-must-be-at-least-32-chars-long-padding
      DATABASE_URL: postgresql+asyncpg://platform:platform@localhost:5432/platform
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install system deps for python3-saml
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config
      - name: Install Python deps (from the lock, hashes enforced)
        working-directory: backend
        # --require-hashes is the point: every artifact must match a hash
        # committed to the repo, so a compromised or swapped upstream package
        # fails the build instead of executing in it. Two steps because pip
        # refuses to mix an editable install with hashed requirements — deps
        # come from the lock, the app itself goes in --no-deps on top.
        #
        # Locally: pip install --require-hashes -r requirements.lock, same file.
        # That equality is the whole point of GAP-016 — "green locally" was
        # worth less than it looked while local and CI resolved different
        # libraries (fastapi 0.136 vs 0.139, which cost us a real CI break).
        run: |
          pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install -e . --no-deps
      - name: Locks are in sync with pyproject
        # A lock that has drifted from pyproject is worse than none: it reports
        # a resolution nobody asked for while looking authoritative.
        #
        # Runs scripts/lock.sh itself rather than reimplementing the uv command,
        # so the check and the tool cannot drift apart — and because uv embeds
        # the VERBATIM command line (including -o) in the file header, so
        # compiling to any other path guarantees a diff on line 2 forever. The
        # generated artifact is a function of the exact invocation; the only
        # honest way to verify it is to make the exact invocation.
        #
        # `git diff --exit-code` over the whole backend, NOT a per-file diff of
        # requirements.lock: lock.sh regenerates BOTH locks (and would regenerate
        # a third if one were added), and it runs before pytest, so a per-file
        # check on the full lock let a stale/hand-edited runtime lock — the one
        # the Docker image installs and cosign SIGNS — pass entirely green. That
        # is "the thing we test is not the thing we ship", reintroduced inside
        # the drift check. This fails if lock.sh changed anything at all.
        run: |
          pip install uv==0.11.29
          scripts/lock.sh > /dev/null
          if ! git diff --exit-code -- backend/; then
            echo "::error::a committed lock is out of sync with pyproject.toml — run scripts/lock.sh and commit ALL changed lock files"
            exit 1
          fi

      - name: pip-audit (dependency vulns)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit
      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing

      - name: Mutation check — prove the SIEM tier gate suite bites
        # Same rule as the SDK job, applied to the other branch this repo has
        # already shipped a hole in: the exporter tier gate. Runs here rather
        # than in the SDK job because it needs the backend environment.
        working-directory: .
        run: scripts/mutation_check.sh backend

  runtime-agent:
    name: Runtime agent (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: runtime-agent/go.sum
      - name: Build
        working-directory: runtime-agent
        run: go build ./...
      - name: Test (race)
        working-directory: runtime-agent
        run: go test -race -cover ./...

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  sdks:
    name: SDKs (fail-closed)
    runs-on: ubuntu-latest
    # The SDKs decide whether unprotected LLM traffic ships (GAP-005). That
    # branch had no tests and no CI job until Phase 1 — the least-covered code
    # in the repo was also the most security-load-bearing. Both languages are
    # gated here because they make the same promise and must not drift apart.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Python SDK — install
        working-directory: sdks/python
        run: pip install -e ".[dev]"
      - name: Python SDK — test
        working-directory: sdks/python
        run: pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node SDK — install
        working-directory: sdks/node
        run: npm ci
      - name: Node SDK — build
        # dist/ is gitignored, and `npm test` runs the compiled dist/*.test.js,
        # so the build is a prerequisite of the test step, not a separate gate.
        working-directory: sdks/node
        run: npm run build
      - name: Node SDK — test
        working-directory: sdks/node
        run: npm test

      - name: Mutation check — prove the fail-closed suites bite
        # Green tests say the code passes; they do not say the tests would
        # notice if the code were wrong. For the branch that decides whether
        # unprotected LLM traffic ships, that difference is the point. This
        # reintroduces the exact regression the reviewers caught and fails the
        # build if either suite stays green against it.
        run: scripts/mutation_check.sh sdk

  security:
    name: Security gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      # ── Secrets scanning (working tree; .gitleaks.toml allowlists build
      #    artifacts + documented test fixtures) ────────────────────────────
      - name: gitleaks (secrets scan)
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          "$(go env GOPATH)/bin/gitleaks" detect --no-git --no-banner -c .gitleaks.toml

      # ── Python SAST (pip-audit runs in the backend job, where the full
      #    dependency set is installed) ─────────────────────────────────────
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: bandit (Python SAST, high severity)
        run: |
          pip install --upgrade pip bandit
          bandit -r app --severity-level high
        working-directory: backend

      # ── Node dependency audit (high severity) ───────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (high severity)
        working-directory: frontend
        run: npm audit --audit-level=high

      # ── Go SAST (high severity + high confidence) ───────────────────────
      - name: gosec (Go SAST)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" -severity high -confidence high ./...
        working-directory: runtime-agent
