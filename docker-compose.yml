services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ClickHouse — telemetry (Sprint 1 ships schema only; client wiring is deferred
  # to a follow-on session). The container is included so the dev stack mirrors
  # production. Nothing in the application's hot path queries ClickHouse.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_DB: telemetry
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Redpanda — active in v2.0 as the asset event bus + runtime telemetry stream.
  # Single-node dev mode here; API-compatible with Kafka clients.
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  app:
    build:
      context: ./backend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      redpanda: { condition: service_healthy }
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_URL: http://clickhouse:8123
      REDPANDA_BROKERS: redpanda:9092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in your shell or .env}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  redpanda-data:
