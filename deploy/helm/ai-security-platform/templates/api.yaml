{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aisp.fullname" . }}-api
  labels:
    {{- include "aisp.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "aisp.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      affinity: {{- include "aisp.affinity" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "aisp.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{ toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: CORS_ORIGINS
              valueFrom: { configMapKeyRef: { name: {{ include "aisp.fullname" . }}-config, key: cors-origins } }
            {{- include "aisp.env" . | nindent 12 }}
            {{- $cfg := printf "%s-config" (include "aisp.fullname" .) }}
            - name: STAGE2_ONNX_MODEL_URL
              valueFrom: { configMapKeyRef: { name: {{ $cfg }}, key: stage2-model-url } }
            - name: STAGE2_ONNX_MODEL_SHA256
              valueFrom: { configMapKeyRef: { name: {{ $cfg }}, key: stage2-model-sha256 } }
            - name: STAGE2_ONNX_TOKENIZER_URL
              valueFrom: { configMapKeyRef: { name: {{ $cfg }}, key: stage2-tokenizer-url } }
            - name: STAGE2_ONNX_TOKENIZER_SHA256
              valueFrom: { configMapKeyRef: { name: {{ $cfg }}, key: stage2-tokenizer-sha256 } }
            - name: STAGE2_ONNX_LABEL_MAP
              valueFrom: { configMapKeyRef: { name: {{ $cfg }}, key: stage2-label-map } }
            - name: STAGE2_ONNX_THRESHOLD
              valueFrom: { configMapKeyRef: { name: {{ $cfg }}, key: stage2-threshold } }
            - name: MODEL_CACHE_DIR
              valueFrom: { configMapKeyRef: { name: {{ $cfg }}, key: model-cache-dir } }
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.stage2.cacheDir | quote }}
          readinessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: {{ .Values.stage2.cacheSizeLimit | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aisp.fullname" . }}-api
  labels:
    {{- include "aisp.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
{{- if .Values.api.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "aisp.fullname" . }}-api
  labels: {{- include "aisp.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "aisp.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.api.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aisp.fullname" . }}-api
  labels: {{- include "aisp.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
{{- end }}
{{- if .Values.api.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aisp.fullname" . }}-api
  labels: {{- include "aisp.labels" . | nindent 4 }}
  {{- with .Values.api.ingress.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.api.ingress.className }}
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- end }}
  {{- if .Values.api.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.api.ingress.host | quote }}]
      secretName: {{ .Values.api.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.api.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aisp.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
{{- end }}
