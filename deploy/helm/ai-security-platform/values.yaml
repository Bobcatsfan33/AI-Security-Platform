# Default values for the AI Security Platform control plane.
# Override via `helm install ... --values custom.yaml` or `--set`.

image:
  repository: ghcr.io/bobcatsfan33/ai-security-platform
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

environment: production

# Non-secret config. Point these at your managed Postgres/ClickHouse/Redis/
# Redpanda — NOT the docker-compose containers.
config:
  databaseUrl: "postgresql+asyncpg://platform:platform@postgres:5432/platform"
  redisUrl: "redis://redis:6379/0"
  clickhouseUrl: "http://clickhouse:8123"
  redpandaBrokers: "redpanda:9092"
  streamingEnabled: "true" # API dual-writes ingested events to the EPA stream
  corsOrigins: ""

# Stage-2 ML classifier (AI Guard, Phase 1A). Pinned to the checksum-verified
# release artifact — the API provisions it at startup, verifies the SHA-256
# before loading (a tampered/truncated download is rejected), and serves it at
# POST /v1/aiguard/classify. Clear modelUrl to fall back to the heuristic
# (verdicts are then honestly labelled mode=stage2_heuristic).
stage2:
  modelUrl: "https://github.com/Bobcatsfan33/AI-Security-Platform/releases/download/stage2-pi-classifier-v1/stage2_model.onnx"
  modelSha256: "1dc9297b916a15b7acb93b9bb8776bd8d1edfea7223aadc0527ac46519a378ee"
  tokenizerUrl: "https://github.com/Bobcatsfan33/AI-Security-Platform/releases/download/stage2-pi-classifier-v1/stage2_tokenizer.json"
  tokenizerSha256: "133b1071a455bb96ec0d7aa1242e616cc42ec29652fded524fb6883832afa903"
  labelMap: "0:safe,1:prompt_injection"
  threshold: "0.5"
  cacheDir: "/var/cache/aisp/models"
  # Writable cache for the provisioned model (root FS is read-only). emptyDir
  # re-downloads ~700MB on every pod start; for production point this at a
  # PVC/RWX volume so replicas share one cached copy.
  cacheSizeLimit: "2Gi"

# JWT secret + crypto keyring refs. In production set existingSecret to a Secret
# managed by Vault/ASM/KMS (key "jwt-secret"); the literal is dev-only and the
# control plane fails closed at startup if JWT_SECRET is unset (secret_gate.py).
secrets:
  existingSecret: ""
  jwtSecret: ""

# Shared HA / security defaults applied to every workload.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

# Spread replicas across nodes/zones for HA (soft anti-affinity by default).
affinity: {}
nodeSelector: {}
tolerations: []

# ── Control-plane API ──────────────────────────────────────────────────────
api:
  enabled: true
  replicaCount: 2
  port: 8000
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits: { cpu: "1", memory: "1Gi" }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: ""
    host: "api.example.com"
    annotations: {}
    tls:
      enabled: true
      secretName: "ai-security-platform-tls"

# ── EPA detection consumer ─────────────────────────────────────────────────
# Scale up to (not beyond) the runtime.events partition count.
epaConsumer:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
  autoscaling:
    enabled: false # bounded by partition count — scale deliberately
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

# ── Optional background worker ─────────────────────────────────────────────
worker:
  enabled: false
  replicaCount: 1
  command: ["python", "-m", "scripts.worker"]
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

# Prometheus scraping for /metrics (see A4 observability).
serviceMonitor:
  enabled: false
  namespace: ""
  interval: "30s"
  labels: {}
